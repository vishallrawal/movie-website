<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select a Movie - MovieBox Office</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                <span>MovieBox Office</span>
            </a>
            <ul class="nav-links">
                <li><a href="movies.html">Hollywood</a></li>
                <li><a href="movies.html">Bollywood</a></li>
                <li><a href="movies.html">Web Series</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="index.html" class="btn btn-primary">Back to Home</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="movie-category">
            <h2>Hollywood</h2>
            <div class="movie-grid">
                <div class="movie-card" data-title="Transformer">
                    <img src="transformer.jpg" alt="TRANSFORMER">
                    <h3>TRANSFORMER</h3>
                </div>
                <div class="movie-card" data-title="The Dark Knight">
                    <img src="the dark knight.jpg" alt="THE DARK KNIGHT">
                    <h3>THE DARK KNIGHT</h3>
                </div>
                <div class="movie-card" data-title="Avatar">
                    <img src="avatar.jpg" alt="AVATAR">
                    <h3>AVATAR</h3>
                </div>
                <div class="movie-card" data-title="Spider Man">
                    <img src="spider man.jpg" alt="SPIDER MAN">
                    <h3>SPIDER MAN</h3>
                </div>
                <div class="movie-card" data-title="Avengers">
                    <img src="avenger.webp" alt="AVENGERS">
                    <h3>AVENGERS</h3>
                </div>
            </div>
        </section>

        <section class="movie-category">
            <h2>Bollywood</h2>
            <div class="movie-grid">
                <div class="movie-card" data-title="3 Idiots">
                    <img src="3 idiots.jpg" alt="3 IDIOTS">
                    <h3>3 IDIOTS</h3>
                </div>
                <div class="movie-card" data-title="Lagaan">
                    <img src="Lagaan.jpg" alt="LAGAAN">
                    <h3>LAGAAN</h3>
                </div>
                <div class="movie-card" data-title="Dangal">
                    <img src="dangal.jpg" alt="DANGAL">
                    <h3>DANGAL</h3>
                </div>
                <div class="movie-card" data-title="Housefull 5">
                    <img src="housefull 5.jpg" alt="HOUSEFULL 5">
                    <h3>HOUSEFULL 5</h3>
                </div>
                <div class="movie-card" data-title="Baaghi 4">
                    <img src="baaghi 4.jpg" alt="BAAGHI 4">
                    <h3>BAAGHI 4</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
