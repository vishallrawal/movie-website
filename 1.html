<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBox Office - Book Your Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="1.html" class="logo">MovieBox Office</a>
            
            <ul class="nav-links">
                <li><a href="movies.html">Web Series</a></li>
                <li><a href="movies.html">Hollywood</a></li>
                <li><a href="movies.html">Bollywood</a></li>
            </ul>

            <div class="auth-buttons">
                <button id="signin-btn" class="btn btn-secondary">Sign In</button>
                <button id="signup-btn" class="btn btn-primary">Sign Up</button>
            </div>
        </nav>
    </header>

    <main class="hero">
      <div class="hero-content">
        <h1>Get Your Movie Tickets Anytime, Anywhere</h1>
        <p>Book tickets online, check showtimes, and enjoy movies hassle-free.</p>
        <a href="movies.html" class="btn btn-primary btn-lg btn-get-started">Get Started</a>
      </div>
    </main>

    <div id="signup-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Create Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" placeholder="Enter your first name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" placeholder="Enter your last name" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                </div> 
                <div class="form-group">
                    <label for="signup-email">E-Mail</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <div id="signin-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Sign In</h2>
            <form id="signin-form">
                <div class="form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" placeholder="Enter your password" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
